name: Sync Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: sync-rules
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync all rules
        run: |
          chmod +x scripts/sync-all.sh scripts/build-custom.sh
          ./scripts/sync-all.sh

      - name: Build custom rules
        run: ./scripts/build-custom.sh

      - name: Show summary
        run: |
          echo "Domain surge files:"
          ls -la domain/surge/*.txt 2>/dev/null | wc -l
          echo "Domain sing-box files:"
          ls -la domain/sing-box/*.srs 2>/dev/null | wc -l
          echo "IP files:"
          ls -la ip/surge/*.txt 2>/dev/null | wc -l
          echo "Custom surge files:"
          ls -la domain/custom-surge/*.txt 2>/dev/null | wc -l
          echo "Custom sing-box files:"
          ls -la domain/custom-sing-box/*.srs 2>/dev/null | wc -l
          echo "Custom mihomo files:"
          ls -la domain/custom-mihomo/* 2>/dev/null | wc -l

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add domain ip sources/custom 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: sync rules"
          git push || echo "nothing to push"
name: Sync Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: sync-rules
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync all rules
        run: |
          chmod +x scripts/sync-all.sh scripts/build-custom.sh
          ./scripts/sync-all.sh

      - name: Build custom rules
        run: ./scripts/build-custom.sh

      - name: Guard artifact counts
        run: |
          chmod +x scripts/guard-artifacts.sh
          ./scripts/guard-artifacts.sh

      - name: Show summary
        run: |
          echo "Domain surge files:"
          ls -1 domain/surge/*.txt 2>/dev/null | wc -l
          echo "Domain sing-box files:"
          ls -1 domain/sing-box/*.srs 2>/dev/null | wc -l
          echo "Domain mihomo files:"
          ls -1 domain/mihomo/*.mrs 2>/dev/null | wc -l
          echo "IP surge files:"
          ls -1 ip/surge/*.txt 2>/dev/null | wc -l
          echo "IP sing-box files:"
          ls -1 ip/sing-box/*.srs 2>/dev/null | wc -l
          echo "IP mihomo files:"
          ls -1 ip/mihomo/*.mrs 2>/dev/null | wc -l
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md \
            .github/workflows/build.yml \
            scripts \
            sources/domain/custom \
            domain \
            ip
          git diff --cached --quiet || git commit -m "chore: sync rules"
          git push || echo "nothing to push"

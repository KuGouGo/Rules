name: Sync Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: sync-rules
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore tool cache
        uses: actions/cache@v4
        with:
          path: .bin
          key: rules-tools-${{ runner.os }}-${{ runner.arch }}-singbox-1.13.2-mihomo-1.19.21

      - name: Lint custom rules
        run: |
          chmod +x scripts/lint-custom-rules.sh
          ./scripts/lint-custom-rules.sh

      - name: Prepare scripts
        run: chmod +x scripts/*.sh

      - name: Sync all rules
        run: ./scripts/sync-all.sh

      - name: Build custom rules
        run: ./scripts/build-custom.sh

      - name: Guard artifacts
        run: ./scripts/guard-artifacts.sh

      - name: Show summary
        if: always()
        run: |
          echo "Domain surge files:"
          ls -1 domain/surge/*.txt 2>/dev/null | wc -l
          echo "Domain sing-box files:"
          ls -1 domain/sing-box/*.srs 2>/dev/null | wc -l
          echo "Domain mihomo files:"
          ls -1 domain/mihomo/*.mrs 2>/dev/null | wc -l
          echo "IP surge files:"
          ls -1 ip/surge/*.txt 2>/dev/null | wc -l
          echo "IP sing-box files:"
          ls -1 ip/sing-box/*.srs 2>/dev/null | wc -l
          echo "IP mihomo files:"
          ls -1 ip/mihomo/*.mrs 2>/dev/null | wc -l
          echo "Changed files summary:"
          git status --short

      - name: Commit
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md \
            .github/workflows/build.yml \
            scripts \
            sources/domain/custom \
            domain \
            ip
          git diff --cached --quiet || git commit -m "chore: sync rules"
          git push || echo "nothing to push"

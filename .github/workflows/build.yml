name: Sync Rules

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'
      - 'scripts/**'
      - 'sources/domain/custom/**'
      - 'sources/ip/**'
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: sync-rules
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore tool cache
        uses: actions/cache@v4
        with:
          path: .bin
          key: rules-tools-${{ runner.os }}-${{ runner.arch }}-singbox-1.13.2-mihomo-1.19.21

      - name: Prepare scripts
        run: chmod +x scripts/*.sh

      - name: Lint custom rules
        run: ./scripts/lint-custom-rules.sh

      - name: Sync all rules
        run: ./scripts/sync-all.sh

      - name: Build custom rules
        run: ./scripts/build-custom.sh

      - name: Guard artifacts
        run: ./scripts/guard-artifacts.sh

      - name: Show summary
        if: always()
        run: |
          echo "Domain surge files:"
          ls -1 domain/surge/*.txt 2>/dev/null | wc -l
          echo "Domain sing-box files:"
          ls -1 domain/sing-box/*.srs 2>/dev/null | wc -l
          echo "Domain mihomo files:"
          ls -1 domain/mihomo/*.mrs 2>/dev/null | wc -l
          echo "IP surge files:"
          ls -1 ip/surge/*.txt 2>/dev/null | wc -l
          echo "IP sing-box files:"
          ls -1 ip/sing-box/*.srs 2>/dev/null | wc -l
          echo "IP mihomo files:"
          ls -1 ip/mihomo/*.mrs 2>/dev/null | wc -l
          echo "Changed files summary:"
          git status --short

      - name: Publish client branches
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/publish-branches.sh

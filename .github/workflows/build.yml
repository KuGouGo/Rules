name: Sync Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: sync-rules
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip gzip

      - name: Sync upstream
        run: |
          chmod +x scripts/*.sh
          ./scripts/sync-upstream.sh

      - name: Build domain rules
        env:
          NO_SKIP: "true"
        run: ./scripts/build-domain.sh

      - name: Build ip rules
        run: ./scripts/build-ip.sh

      - name: Show summary
        run: |
          echo "Domain files:"
          find domain -type f | sort | head -50
          echo "IP files:"
          find ip -type f | sort | head -50

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sources domain ip configs scripts README.md .gitignore
          git diff --cached --quiet || git commit -m "chore: sync rules"

      - name: Push changes
        run: git push
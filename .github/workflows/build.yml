name: Sync Rules

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Build scope
        type: choice
        required: true
        default: auto
        options:
          - auto
          - custom
          - full
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'
      - 'scripts/**'
      - 'sources/custom/**'
  schedule:
    # Run once per day at 08:00 UTC.
    - cron: '0 8 * * *'
concurrency:
  group: sync-rules
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine build scope
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SCOPE: ${{ github.event.inputs.scope || 'auto' }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          scope="full"
          reason="scheduled sync refresh"
          base_sha=""

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            case "$INPUT_SCOPE" in
              custom)
                scope="custom"
                reason="manual custom-only publish"
                base_sha="$(git rev-parse HEAD^ 2>/dev/null || true)"
                ;;
              full|auto)
                scope="full"
                reason="manual full sync"
                ;;
            esac
          elif [ "$EVENT_NAME" = "push" ]; then
            before="$BEFORE_SHA"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="$(git rev-parse "${CURRENT_SHA}^" 2>/dev/null || true)"
            fi
            base_sha="$before"

            changed_files=""
            deleted_custom_files=""
            if [ -n "$before" ]; then
              changed_files="$(git diff --name-only "$before" "$CURRENT_SHA")"
              deleted_custom_files="$(git diff --name-only --diff-filter=D "$before" "$CURRENT_SHA" -- 'sources/custom/**')"
            else
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$CURRENT_SHA")"
              deleted_custom_files="$(git diff-tree --no-commit-id --name-only --diff-filter=D -r "$CURRENT_SHA" -- 'sources/custom/**')"
            fi

            echo "Changed files:"
            printf '%s\n' "$changed_files"

            if [ -n "$deleted_custom_files" ]; then
              scope="full"
              reason="custom deletions require full sync"
            elif [ -n "$changed_files" ] && printf '%s\n' "$changed_files" | grep -Eqv '^sources/custom/'; then
              scope="full"
              reason="push includes non-custom changes"
            else
              scope="custom"
              reason="push only updates custom sources"
            fi
          fi

          echo "scope=$scope" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "Build scope: $scope ($reason)"

      - name: Resolve core versions
        id: core_versions
        run: bash ./scripts/resolve-core-versions.sh

      - name: Restore tool cache
        uses: actions/cache@v4
        with:
          path: .bin
          key: rules-tools-${{ runner.os }}-${{ runner.arch }}-singbox-${{ steps.core_versions.outputs.sing_box_version }}-mihomo-${{ steps.core_versions.outputs.mihomo_version }}

      - name: Prepare scripts
        run: chmod +x scripts/*.sh scripts/lib/*.sh

      - name: Lint custom rules
        run: ./scripts/lint-custom-rules.sh

      - name: Show selected build scope
        run: echo "${{ steps.scope.outputs.scope }} - ${{ steps.scope.outputs.reason }}"

      - name: Sync all rules
        if: steps.scope.outputs.scope == 'full'
        run: ./scripts/sync-all.sh

      - name: Restore published artifacts
        if: steps.scope.outputs.scope == 'custom'
        run: ./scripts/restore-published-artifacts.sh

      - name: Build custom rules
        env:
          RULES_CONFLICT_BASE_SHA: ${{ steps.scope.outputs.base_sha }}
        run: ./scripts/build-custom.sh

      - name: Fetch extra mihomo rules
        if: steps.scope.outputs.scope == 'full'
        run: ./scripts/fetch-extra-mihomo.sh

      - name: Guard artifacts
        run: ./scripts/guard-artifacts.sh

      - name: Show summary
        if: always()
        run: |
          echo "Domain surge files:"
          ls -1 .output/domain/surge/*.list 2>/dev/null | wc -l
          echo "Domain sing-box files:"
          ls -1 .output/domain/sing-box/*.srs 2>/dev/null | wc -l
          echo "Domain mihomo files:"
          ls -1 .output/domain/mihomo/*.mrs 2>/dev/null | wc -l
          echo "IP surge files:"
          ls -1 .output/ip/surge/*.list 2>/dev/null | wc -l
          echo "IP sing-box files:"
          ls -1 .output/ip/sing-box/*.srs 2>/dev/null | wc -l
          echo "IP mihomo files:"
          ls -1 .output/ip/mihomo/*.mrs 2>/dev/null | wc -l
          echo "Changed files summary:"
          git status --short

      - name: Publish client branches
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/publish-branches.sh

name: Sync Rules

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Build scope
        type: choice
        required: true
        default: auto
        options:
          - auto
          - custom
          - full
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'
      - 'Makefile'
      - 'config/**'
      - 'scripts/**'
      - 'sources/custom/**'
      - 'tests/**'
  schedule:
    # Run once per day at 08:00 UTC.
    - cron: '0 8 * * *'
concurrency:
  group: sync-rules
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Select build scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SCOPE: ${{ github.event.inputs.scope || 'auto' }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          CURRENT_SHA: ${{ github.sha }}
        run: ./scripts/commands/select-build-scope.sh

      - name: Prepare scripts
        run: find scripts -type f \( -name '*.sh' -o -name '*.py' \) -exec chmod +x {} +

      - name: Validate scripts and fixtures
        run: REQUIRE_SHELLCHECK=1 make validate

      - name: Resolve tool versions
        id: core_versions
        run: bash ./scripts/commands/resolve-tool-versions.sh

      - name: Restore tool cache
        uses: actions/cache@v5
        with:
          path: .bin
          key: rules-tools-${{ runner.os }}-${{ runner.arch }}-singbox-${{ steps.core_versions.outputs.sing_box_version }}-mihomo-${{ steps.core_versions.outputs.mihomo_version }}

      - name: Show selected build scope
        run: echo "${{ steps.scope.outputs.scope }} - ${{ steps.scope.outputs.reason }}"

      - name: Sync upstream rules
        if: steps.scope.outputs.scope == 'full'
        run: ./scripts/commands/sync-upstream.sh

      - name: Restore artifacts
        if: steps.scope.outputs.scope == 'custom'
        run: ./scripts/commands/restore-artifacts.sh

      - name: Build custom rules
        env:
          RULES_CONFLICT_BASE_SHA: ${{ steps.scope.outputs.base_sha }}
        run: make build-custom

      - name: Sync fakeip-filter
        if: steps.scope.outputs.scope == 'full'
        run: ./scripts/commands/sync-fakeip-filter.sh

      - name: Guard artifacts
        run: ./scripts/commands/guard-artifacts.sh

      - name: Show summary
        if: always()
        run: |
          if [ -d .output ]; then
            python3 scripts/tools/summarize-artifacts.py .output --output .output/build-summary.json >/dev/null
            cat .output/build-summary.json
            if [ -f .output/upstream-summary.json ]; then
              cat .output/upstream-summary.json
            fi
          fi
          echo "Changed files summary:"
          git status --short

      - name: Publish client branches
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/commands/publish-branches.sh

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - '*'
        update-types:
          - major
          - minor
          - patch
    commit-message:
      prefix: deps(actions)
    rebase-strategy: auto
